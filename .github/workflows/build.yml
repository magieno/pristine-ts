name: build
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  id-token: write  # Required for OIDC
  contents: write

jobs:
  build:
    name: Build
    # Set the type of machine to run on
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref != 'refs/heads/master'

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org
          scope: '@pristine-ts'
          # Caches the npm download/registry tarballs (~/.npm) keyed off the lockfile hash.
          # Cache hit drops `npm ci` from ~60s to ~5s. Verified by `npm ci`'s own integrity
          # check against package-lock.json so cache poisoning isn't a risk.
          cache: 'npm'
      # `--no-audit --no-fund` skip the audit pass and the funding-message banner. Both are
      # noise in CI output (we audit separately) and shave a few seconds per install.
      - run: npm ci --no-audit --no-fund
      # Caches each package's `dist/` output across runs so TypeScript's incremental
      # compilation (enabled via `incremental: true` in root tsconfig) can skip unchanged
      # files. The cache key includes the commit SHA so a successful run uniquely fingerprints
      # the build; restore-keys allow partial hits from any previous build for the same Node
      # version, which is exactly what tsc's incremental algorithm needs to know what's stale.
      #
      # Cache size is ~30-60MB total (well under GitHub's 10GB limit). On a typical "edit one
      # file" PR this cuts the build step from ~120s to ~15-30s.
      - uses: actions/cache@v4
        with:
          path: |
            packages/*/dist
          key: pristine-build-${{ matrix.node-version }}-${{ github.sha }}
          restore-keys: |
            pristine-build-${{ matrix.node-version }}-
      - run: npm run build
      - run: npx eslint --ext .ts packages/**
      - run: npm run test
      - run: npm run e2e
      - run: npm run perf

  publish:
    name: Publish
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    # Set the type of machine to run on
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          scope: '@pristine-ts'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: git config --global user.name 'ima-bot'
      - run: git config --global user.email 'ima-bot@ima-tech.ca'
      - run: npm run bump-patch
      - run: npm run publish-ci
